PACKAGE_NAME="rtw88-patched"
PACKAGE_VERSION="1.0"

MAKE="make -j$(nproc) KVER=$kernelver KDIR=/lib/modules/$kernelver/build"
CLEAN="make clean"

BUILT_MODULE_NAME[0]="rtw88_core"
BUILT_MODULE_LOCATION[0]="."
DEST_MODULE_NAME[0]="rtw88_core"
DEST_MODULE_LOCATION[0]="/kernel/drivers/net/wireless/realtek/rtw88/"

BUILT_MODULE_NAME[1]="rtw88_88xxa"
BUILT_MODULE_LOCATION[1]="."
DEST_MODULE_NAME[1]="rtw88_88xxa"
DEST_MODULE_LOCATION[1]="/kernel/drivers/net/wireless/realtek/rtw88/"

BUILT_MODULE_NAME[2]="rtw88_8812a"
BUILT_MODULE_LOCATION[2]="."
DEST_MODULE_NAME[2]="rtw88_8812a"
DEST_MODULE_LOCATION[2]="/kernel/drivers/net/wireless/realtek/rtw88/"

BUILT_MODULE_NAME[3]="rtw88_8812au"
BUILT_MODULE_LOCATION[3]="."
DEST_MODULE_NAME[3]="rtw88_8812au"
DEST_MODULE_LOCATION[3]="/kernel/drivers/net/wireless/realtek/rtw88/"

BUILT_MODULE_NAME[4]="rtw88_usb"
BUILT_MODULE_LOCATION[4]="."
DEST_MODULE_NAME[4]="rtw88_usb"
DEST_MODULE_LOCATION[4]="/kernel/drivers/net/wireless/realtek/rtw88/"

AUTOINSTALL="yes"
